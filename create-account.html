<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Orves — Create your account</title>
<meta name="description" content="Create your free Orves account and get 15,000 credits to start building on the Verifiable Knowledge Layer. No credit card required."/>
<link rel="canonical" href="https://orves.ai/create-account"/>
<meta property="og:title" content="Orves — Create your account"/>
<meta property="og:description" content="Create your free Orves account and get 15,000 credits to start building on the Verifiable Knowledge Layer. No credit card required."/>
<meta property="og:type" content="website"/>
<meta property="og:url" content="https://orves.ai/create-account"/>
<meta property="og:site_name" content="Orves"/>
<meta name="twitter:card" content="summary"/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>(function(){try{if(localStorage.getItem('orves-theme')==='light')document.documentElement.dataset.base='light'}catch(e){}})()</script>
<link rel="stylesheet" href="assets/orves.css">
</head>
<body>
<div class="grid-bg"></div>
<div class="page">

<nav><div class="wrap navin">
  <a class="brand" href="./"><svg width="26" height="26" viewBox="0 0 34 34" fill="none"><circle cx="17" cy="17" r="15.3" stroke="var(--brand)" stroke-width="1.5"/><circle cx="17" cy="17" r="8.6" stroke="var(--brand2)" stroke-width="3"/><circle cx="17" cy="17" r="2" fill="var(--fg)"/></svg><span class="word">Orves</span></a>
  <span class="sp"></span>
  <button class="thbtn" aria-label="Toggle theme">☀</button>
  <a class="si" href="./">← Back</a>
</div></nav>


<main class="wrap">


<section style="border-top:0;padding:70px 0 60px">
  <div class="hero" style="padding:0;border-top:0;grid-template-columns:1fr 1fr;gap:60px;align-items:center">
    <div class="rv">
      <span class="eye">Free tier</span>
      <h1 style="font-size:36px;max-width:14ch;margin:14px 0 12px">Start building on Orves.</h1>
      <p class="lead" style="font-size:15px">Create your account and get <b style="color:var(--fg)">15,000 free credits</b> to build on the Verifiable Knowledge Layer.</p>
      <svg viewBox="0 0 300 260" style="width:min(300px,80%);height:auto;margin-top:34px" role="img" aria-label="Reality flows through Parser into Verifiable Knowledge, consumed by agents, models and applications.">
        <rect class="m-box" x="90" y="6" width="120" height="34" rx="9" style="opacity:.6"/><text class="m-t" x="150" y="27" text-anchor="middle" style="font-size:11px;opacity:.7">Reality</text>
        <line x1="150" y1="40" x2="150" y2="58" style="stroke:var(--line2);stroke-width:1.2"/>
        <rect x="90" y="58" width="120" height="34" rx="9" style="fill:var(--panel);stroke:color-mix(in srgb,var(--acc) 55%,transparent)"/><text class="m-t" x="150" y="79" text-anchor="middle" style="font-size:11px">Parser</text>
        <line x1="150" y1="92" x2="150" y2="110" style="stroke:color-mix(in srgb,var(--acc) 30%,var(--line2));stroke-width:1.2"/>
        <rect x="60" y="110" width="180" height="44" rx="11" style="fill:color-mix(in srgb,var(--acc) 7%,var(--panel));stroke:var(--acc)"/><text class="m-t" x="150" y="136" text-anchor="middle" style="font-size:11.5px;fill:var(--acc2);font-weight:700">Verifiable Knowledge</text>
        <path d="M 120 154 C 105 180 75 190 60 206" style="fill:none;stroke:color-mix(in srgb,var(--acc) 40%,var(--line2));stroke-width:1"/>
        <path d="M 150 154 L 150 206" style="fill:none;stroke:color-mix(in srgb,var(--acc) 40%,var(--line2));stroke-width:1"/>
        <path d="M 180 154 C 195 180 225 190 240 206" style="fill:none;stroke:color-mix(in srgb,var(--acc) 40%,var(--line2));stroke-width:1"/>
        <rect class="m-box" x="14" y="206" width="92" height="30" rx="8"/><text class="m-t" x="60" y="225" text-anchor="middle" style="font-size:9.5px">Agents</text>
        <rect class="m-box" x="118" y="206" width="64" height="30" rx="8"/><text class="m-t" x="150" y="225" text-anchor="middle" style="font-size:9.5px">Models</text>
        <rect class="m-box" x="194" y="206" width="92" height="30" rx="8"/><text class="m-t" x="240" y="225" text-anchor="middle" style="font-size:9px">Applications</text>
      </svg>
    </div>
    <div class="auth rv" style="margin:0">
      <h2 style="font-size:24px;margin:0 0 6px">Create your account</h2>
      <p style="font-size:13.5px;color:var(--fg2);margin-bottom:24px">Free plan · 15,000 credits included.</p>
      <div id="autherr" style="display:none;border:1px solid color-mix(in srgb,var(--hold) 50%,transparent);background:color-mix(in srgb,var(--hold) 8%,transparent);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--hold);margin-bottom:14px"></div>
      <form class="authform" method="post" action="https://app.orves.ai/api/signup">
        <label class="af"><input type="text" name="name" required placeholder="Full name" autocomplete="name" style="margin-top:0"/></label>
        <label class="af"><input type="email" name="email" required placeholder="Your best email" autocomplete="email" style="margin-top:0"/></label>
        <label class="af"><input type="password" name="password" required minlength="8" placeholder="Password (min. 8 characters)" autocomplete="new-password" style="margin-top:0"/></label>
        <button class="btn" type="submit" style="width:100%;margin-top:6px">Create free account</button>
      </form>
      <p class="mono" style="font-size:11px;color:var(--fg3);margin-top:16px;line-height:1.9">
        <span style="color:var(--acc2)">✓</span> 15,000 free credits&nbsp;&nbsp;<span style="color:var(--acc2)">✓</span> No credit card required
      </p>
      <p style="font-size:12.5px;color:var(--fg3);margin-top:20px">Already have an account? <a href="login">Log in</a></p>
    </div>
  </div>
</section>

<script>
(function(){
  var e = new URLSearchParams(location.search).get('error');
  if(!e) return;
  var msg = { exists: 'An account with this email already exists — log in instead.',
              short: 'Password must be at least 8 characters.',
              invalid: 'Please check your name and email and try again.' }[e] || 'Something went wrong — please try again.';
  var el = document.getElementById('autherr'); el.textContent = msg; el.style.display = 'block';
})();
</script>

</main>



<script src="assets/orves.js"></script>
</body></html>
